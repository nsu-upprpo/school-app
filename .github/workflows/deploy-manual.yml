name: Deploy Backend Manually

on:
  workflow_dispatch:

concurrency:
  group: school-app-manual-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull fresh backend image and restart backend
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 \
            -p "${{ secrets.SERVER_PORT }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.SERVER_HOST }}" \
            "set -euo pipefail && \
             cd '${{ secrets.SERVER_APP_DIR }}' && \
             docker-compose pull && \
             docker-compose up --force-recreate --build -d"