databaseChangeLog:
  - changeSet:
      id: 011-create-project-grades
      author: ilia
      changes:
        - createTable:
            tableName: project_grades
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: project_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: child_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: teacher_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: score
                  type: int
              - column:
                  name: comment
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: project_grades
            baseColumnNames: project_id
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_project_grades_project
        - addForeignKeyConstraint:
            baseTableName: project_grades
            baseColumnNames: child_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_project_grades_child
        - addForeignKeyConstraint:
            baseTableName: project_grades
            baseColumnNames: teacher_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_project_grades_teacher
