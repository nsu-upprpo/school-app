databaseChangeLog:
  - changeSet:
      id: 013-create-payments
      author: ilia
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: child_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: group_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: period
                  type: varchar(20)
              - column:
                  name: amount
                  type: decimal(10,2)
              - column:
                  name: status
                  type: varchar(20)
              - column:
                  name: covers_from
                  type: date
              - column:
                  name: covers_to
                  type: date
              - column:
                  name: paid_at
                  type: timestamp
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: child_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_payments_child
        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: group_id
            referencedTableName: groups
            referencedColumnNames: id
            constraintName: fk_payments_group
