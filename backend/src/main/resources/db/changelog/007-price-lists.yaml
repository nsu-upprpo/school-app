databaseChangeLog:
  - changeSet:
      id: 007-create-price-lists
      author: ilia
      changes:
        - createTable:
            tableName: price_lists
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: course_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: branch_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: period
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: decimal(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: price_lists
            baseColumnNames: course_id
            referencedTableName: courses
            referencedColumnNames: id
            constraintName: fk_price_lists_course
        - addForeignKeyConstraint:
            baseTableName: price_lists
            baseColumnNames: branch_id
            referencedTableName: branches
            referencedColumnNames: id
            constraintName: fk_price_lists_branch
        - addUniqueConstraint:
            tableName: price_lists
            columnNames: course_id, branch_id, period
            constraintName: uq_price_lists_course_branch_period
