databaseChangeLog:
  - changeSet:
      id: 012-create-attendances
      author: ilia
      changes:
        - createTable:
            tableName: attendances
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: lesson_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: rescheduled_lesson_id
                  type: uuid
              - column:
                  name: child_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: marked_by
                  type: uuid
              - column:
                  name: marked_at
                  type: timestamp
              - column:
                  name: status
                  type: varchar(20)
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: attendances
            baseColumnNames: lesson_id
            referencedTableName: lessons
            referencedColumnNames: id
            constraintName: fk_attendances_lesson
        - addForeignKeyConstraint:
            baseTableName: attendances
            baseColumnNames: rescheduled_lesson_id
            referencedTableName: lessons
            referencedColumnNames: id
            constraintName: fk_attendances_rescheduled_lesson
        - addForeignKeyConstraint:
            baseTableName: attendances
            baseColumnNames: child_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_attendances_child
        - addForeignKeyConstraint:
            baseTableName: attendances
            baseColumnNames: marked_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_attendances_marked_by
